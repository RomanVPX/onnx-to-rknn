name: ONNX to RKNN Conversion

on:
  workflow_dispatch:
    inputs:
      onnx_model_url:
        description: 'URL of ONNX model to convert'
        required: true
      target_resolutions:
        description: 'Comma-separated list of target resolutions (e.g., 1280x256,1440x384)'
        required: true
      input_name:
        description: 'Model input tensor name'
        default: 'input'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/rknn-converter
          tags: |
            type=ref,event=branch,enable=true,prefix=,suffix=
            type=ref,event=tag,enable=true
            type=raw,value=latest,enable=${{ github.ref == github.event.repository.default_branch }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.tags }}-cache
          cache-to: type=registry,ref=${{ steps.meta.outputs.tags }}-cache,mode=max


  convert:
    name: Convert Models
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed for creating releases
      packages: read       # ⬅ allow pulling ghcr.io image
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ONNX model
        id: download_model
        run: |
          mkdir -p models output
          cd models
          echo "Downloading from ${{ github.event.inputs.onnx_model_url }}..."
          curl -L -O "${{ github.event.inputs.onnx_model_url }}"
          if [ $? -ne 0 ]; then
            echo "::error::Failed to download ONNX model."
            exit 1
          fi

          DOWNLOADED_FILENAME=$(ls *.onnx | head -n 1)
          if [ -z "$DOWNLOADED_FILENAME" ]; then
            echo "::error::Could not find downloaded .onnx file in models/ directory."
            exit 1
          fi

          echo "Downloaded $(ls -lh "$DOWNLOADED_FILENAME" | awk '{print $5}') as $DOWNLOADED_FILENAME"
          echo "filename=$DOWNLOADED_FILENAME" >> $GITHUB_OUTPUT
          cd ..

      - name: Convert models
        run: |
          IMAGE_TAGS="${{ needs.build-and-push.outputs.image_tag }}"
          FIRST_TAG=$(echo "$IMAGE_TAGS" | head -n 1)
          echo "Using image tag: $FIRST_TAG"

          IFS=',' read -ra resolutions <<< "$(echo "${{ github.event.inputs.target_resolutions }}" | tr -d ' ')"
          for res in "${resolutions[@]}"; do
            echo "Converting for resolution: $res"
            docker run --rm \
              -v ${{ github.workspace }}/models:/workspace/input_models \
              -v ${{ github.workspace }}/output:/workspace/output_models \
              "$FIRST_TAG" \
              --model_source "/workspace/input_models/${{ steps.download_model.outputs.filename }}" \
              --resolutions "$res" \
              --input_name "${{ github.event.inputs.input_name }}"
            if [ $? -ne 0 ]; then
              echo "::error::Conversion failed for resolution $res"
              exit 1
            fi
          done

      - name: Create release notes
        id: release_notes
        run: |
          cat > release_notes.md << EOF

          # RKNN Models
          Original ONNX model: [${{ steps.download_model.outputs.filename }}](${{ github.event.inputs.onnx_model_url }})

          ## Details
          - Input tensor name: \`${{ github.event.inputs.input_name }}\`
          - Target resolutions: \`${{ github.event.inputs.target_resolutions }}\`
          - Workflow run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ## Generated Models
          $(ls -1 output/*.rknn | while read f; do echo "- $(basename "$f")"; done)
          EOF


      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: models-${{ github.run_id }}
          name: "RKNN models from ${{ steps.download_model.outputs.filename }}"
          body_path: release_notes.md
          files: output/*.rknn
          draft: false
          prerelease: false
